# Deploys to: ~/pihole/docker-compose.yml
# Reload: cd ~/pihole && docker compose up -d
# After first deploy, verify upstream DNS in Pi-hole UI:
#   Settings → DNS → confirm 172.17.0.1#5335 is set as custom upstream → Save if needed
#   The compose env var seeds the value on fresh-volume creation; the UI-stored value
#   takes precedence on subsequent restarts.

services:
  pihole:
    container_name: pihole
    # Pin to a specific version. ':latest' tracks Pi-hole v6 (released 2025),
    # which changed FTL architecture, env var names, and CLI syntax.
    # v5 → v6 env var differences are noted below.
    # To upgrade to v6: update image tag and env vars together — do not mix.
    image: pihole/pihole:2024.07.0
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: "America/New_York"
      # Upstream DNS — Docker bridge gateway to Unbound on the host (port 5335).
      # 127.0.0.1 is the container's own loopback and does NOT reach the host.
      PIHOLE_DNS_: "172.17.0.1#5335"
      WEBPASSWORD: "CHANGE_ME"
      DNSMASQ_USER: "pihole"
      FTL_CMD: "no-daemon"        # v5 only — ignored or removed in v6
      # Disable Pi-hole's dnsmasq cache (v5 env var).
      # Unbound caches aggressively (512 MB rrset + 256 MB msg in tuning.conf).
      # A second cache layer in front of Unbound answers queries before they
      # reach the recursive resolver, bypassing the dilution model entirely.
      # With CACHE_SIZE=0, all queries flow through to Unbound.
      # v6 equivalent: FTLCONF_dns_cache_size: "0"
      CACHE_SIZE: "0"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d

volumes:
  pihole_data:
  dnsmasq_data:
