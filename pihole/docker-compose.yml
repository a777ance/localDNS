# Deploys to: ~/pihole/docker-compose.yml
# Reload: cd ~/pihole && docker compose up -d
# IMPORTANT: After first deploy, confirm upstream DNS in Pi-hole UI:
#   Settings → DNS → custom upstream must be the single entry 172.17.0.1#5335
#   (the Docker bridge gateway to Unbound on the host). Do NOT add the public
#   resolvers here — the streaming/personal split is owned entirely by Unbound
#   (see unbound/streaming-forward.conf). Adding public resolvers here would
#   race them for ALL queries and leak personal lookups. 127.0.0.1 is wrong:
#   inside the container it is the container's own loopback, not the host.

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: "America/New_York"
      # Upstream DNS — single upstream: Unbound on the host.
      # Pi-hole forwards EVERY query to Unbound, which then decides per-domain:
      # streaming/low-sensitivity domains are forwarded out to public resolvers
      # for speed (see unbound/streaming-forward.conf); everything else resolves
      # recursively and privately. Keeping a single upstream here guarantees no
      # public resolver ever sees a personal query.
      PIHOLE_DNS_: "172.17.0.1#5335"
      WEBPASSWORD: "CHANGE_ME"
      DNSMASQ_USER: "pihole"
      FTL_CMD: "no-daemon"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d

volumes:
  pihole_data:
  dnsmasq_data:
