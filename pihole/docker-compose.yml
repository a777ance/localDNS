# Deploys to: ~/pihole/docker-compose.yml
# Reload: cd ~/pihole && docker compose up -d
# After first deploy, verify upstream DNS in Pi-hole UI:
#   Settings → DNS → confirm 172.17.0.1#5335 is set as custom upstream → Save if needed
#   The compose env var seeds the value on fresh-volume creation; the UI-stored value
#   takes precedence on subsequent restarts.

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: "America/New_York"
      # Upstream DNS — Docker bridge gateway to Unbound on the host (port 5335).
      # 127.0.0.1 is the container's own loopback and does NOT reach the host.
      PIHOLE_DNS_: "172.17.0.1#5335"
      WEBPASSWORD: "CHANGE_ME"
      DNSMASQ_USER: "pihole"
      FTL_CMD: "no-daemon"
      # Disable Pi-hole's dnsmasq cache. Unbound already caches aggressively
      # (512 MB rrset-cache + 256 MB msg-cache in tuning.conf). A second cache
      # layer in front of Unbound short-circuits queries before they reach the
      # recursive resolver, degrading the dilution model. With this set to 0,
      # all queries flow through to Unbound; Unbound answers from its own cache
      # or fans out recursively as appropriate.
      CACHE_SIZE: "0"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d

volumes:
  pihole_data:
  dnsmasq_data:
