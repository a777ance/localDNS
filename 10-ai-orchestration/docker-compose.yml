# Deploys to: ~/llm-router/docker-compose.yml
# Reload:     cd ~/llm-router && docker compose up -d
# Beside it:  ~/llm-router/config.yaml (router config) and ~/llm-router/.env (secrets —
#             git-ignored; copy from .env.example and fill in before first start).
#
# Two services, both host-net (the repo's established pattern — see Pi-hole and
# Uptime Kuma — so each reaches loopback peers directly and UFW can gate the port):
#   litellm     the router / API        ai.home.lan:4040   (4000 is NoMachine)
#   open-webui  the browser chat UI     chat.home.lan:3000 (8080 is the Pi-hole UI)
# UFW (04-ufw/setup.sh) gates 4040 and 3000 to the LAN and the WireGuard subnet.

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: llm-router
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4040"]

  # Browser chat UI in front of the router. It talks ONLY to LiteLLM (not Ollama
  # directly — ENABLE_OLLAMA_API=false), so routing, retries, and failover apply to
  # UI traffic too. The first account created in the web UI becomes the admin; data
  # persists in ./open-webui-data (git-ignored).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    network_mode: host
    depends_on:
      - litellm
    environment:
      - PORT=3000
      - OPENAI_API_BASE_URL=http://127.0.0.1:4040/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}   # interpolated from .env by docker compose
      - ENABLE_OLLAMA_API=false                # force all traffic through the router
    volumes:
      - ./open-webui-data:/app/backend/data
