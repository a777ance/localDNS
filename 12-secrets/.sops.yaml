# sops configuration — how the vault is sealed.
#
# sops finds this file by walking UP from the file it is (de)crypting, so this one
# governs everything under 12-secrets/vault/.
#
# The `age:` value below is an age PUBLIC key (a recipient). Public keys are safe to
# commit — they can only ENCRYPT. The matching age IDENTITY (the private half that
# DECRYPTS) is the "wand": it lives on the USB / hardware token and NEVER enters the
# repo or the t630's eMMC. Mint it once (README, Step 2) and paste its "Public key:"
# line here, replacing the placeholder:
#
#   age-keygen -o /mnt/usb-vault/a777ance-age.key      # prints: Public key: age1...
#
# Add more recipients (comma/newline-separated) to let a second key also decrypt —
# e.g. a backup identity sealed in a physical safe, so a lost USB is not a lost vault.
creation_rules:
  - path_regex: vault/.*\.env\.sops$
    age: >-
      age1REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
