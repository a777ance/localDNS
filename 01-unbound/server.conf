# Deploys to: /etc/unbound/unbound.conf.d/server.conf
# Reload: sudo systemctl restart unbound

server:
    verbosity: 1
    interface: 0.0.0.0 #bind Unbound to all interfaces
#    interface: 127.0.0.1 #bind Unbound to single Loopback
#    interface: 172.17.0.1 #docker bridge loopback
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    root-hints: "/var/lib/unbound/root.hints"

    # Unbound is Pi-hole's private upstream, reached only over the host loopback
    # (127.0.0.1:5335 — both Pi-hole and Uptime Kuma are host-networked) plus the
    # docker0 bridge (defensive, for any future bridge-mode container). The LAN
    # (192.168.0.0/16) and WG (10.0.0.0/8) are deliberately NOT allowed, so no LAN
    # host can query :5335 directly — this matches the "Pi-hole only" service tables
    # and the UFW rules (5335 is not opened to the LAN).
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow

    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
