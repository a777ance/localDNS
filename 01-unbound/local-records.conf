# Deploys to: /etc/unbound/unbound.conf.d/local-records.conf
# Reload: sudo systemctl restart unbound
#
# LAN-only names answered authoritatively by Unbound. Added for the LLM router's
# stable front doors: ai.home.lan (API) + chat.home.lan (UI) -> the t630. Clients
# query Pi-hole, which forwards to Unbound (127.0.0.1#5335).
#
# "transparent" overrides ONLY the names defined here and passes everything else in
# the zone through to normal resolution, so it can't black-hole other .lan lookups.
#
# Note: the t630 resolves its OWN DNS via external resolvers (03-host-dns), not its
# Pi-hole/Unbound — so on the box itself, reach the router at 127.0.0.1:4040, not by
# this name. The name is for the other LAN + WG clients.
server:
    local-zone: "home.lan." transparent
    local-data: "ai.home.lan. IN A 192.168.1.118"     # LLM router API (LiteLLM, :4040)
    local-data: "chat.home.lan. IN A 192.168.1.118"   # LLM chat UI (Open WebUI, :3000)
