# Deploys to: /etc/unbound/unbound.conf.d/local-records.conf
# Reload: sudo systemctl restart unbound
#
# LAN-only names answered authoritatively by Unbound. Stable front doors for the
# t630's services so the browser sidebar (11-console) can pin a NAME, not an IP:port.
# Started with the LLM router (ai.home.lan API + chat.home.lan UI); the rest were
# added for the console / high seat. Clients query Pi-hole, which forwards to
# Unbound (127.0.0.1#5335).
#
# "transparent" overrides ONLY the names defined here and passes everything else in
# the zone through to normal resolution, so it can't black-hole other .lan lookups.
#
# Note: the t630 resolves its OWN DNS via external resolvers (03-host-dns), not its
# Pi-hole/Unbound — so on the box itself, reach the router at 127.0.0.1:4040, not by
# this name. The name is for the other LAN + WG clients.
server:
    local-zone: "home.lan." transparent
    local-data: "ai.home.lan. IN A 192.168.1.118"        # LLM router API (LiteLLM, :4040)
    local-data: "chat.home.lan. IN A 192.168.1.118"      # LLM chat UI (Open WebUI, :3000)
    local-data: "console.home.lan. IN A 192.168.1.118"   # the high seat — launcher (:8088, 11-console)
    local-data: "term.home.lan. IN A 192.168.1.118"      # web terminal -> thin client (ttyd :7681)
    local-data: "laptop.home.lan. IN A 192.168.1.118"    # web terminal -> laptop, via t630 jump (ttyd :7682)
    local-data: "kuma.home.lan. IN A 192.168.1.118"      # Uptime Kuma (:3001)
    local-data: "pihole.home.lan. IN A 192.168.1.118"    # Pi-hole UI (:8080)
