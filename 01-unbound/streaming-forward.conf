# Deploys to: /etc/unbound/unbound.conf.d/streaming-forward.conf
# Reload: sudo systemctl restart unbound
#
# THE DNS SPLIT LIVES HERE. This is the single decision point for where each
# query goes. Pi-hole forwards every query to Unbound (127.0.0.1#5335) and does
# no resolver selection of its own. Unbound then splits by domain:
#
#   * Domains listed below (streaming / music / gaming CDNs — high-volume,
#     low-sensitivity) are forwarded to Cloudflare over DNS-over-TLS (port 853),
#     so the ISP sees an encrypted channel instead of cleartext lookups. This is
#     the deliberate privacy-for-speed trade on low-sensitivity traffic.
#
#   * Everything NOT listed here — banking, email, health, personal services,
#     the default — is resolved recursively by Unbound with DNSSEC. Cloudflare
#     never sees these queries. This recursive "nucleus" is sovereign. THE
#     INVARIANT: never add forward-zones for sensitive domains here — that would
#     hand Cloudflare your private lookups, the exact thing this design prevents.
#
# forward-first: yes — if Cloudflare's DoT endpoints are unreachable (e.g. an ISP
# blocking :853), Unbound falls back to recursive resolution rather than SERVFAIL.
# Streaming just gets slower, never broken.
#
# WHY DoT-IN-UNBOUND INSTEAD OF A SEPARATE PROXY:
#   This path originally fanned out to ~18 public resolvers over PLAINTEXT UDP/53
#   (lowest-RTT wins), which leaked every streaming lookup to the ISP in the
#   clear. The plan was to engulf a cloudflared DoH organelle on loopback — but
#   Cloudflare REMOVED `cloudflared proxy-dns` in v2026.2.0, so that organism is
#   dead. Unbound speaks DoT natively, so the cleaner move is endosymbiotic gene
#   transfer: the host absorbs the capability the organelle would have provided.
#   One fewer daemon, nothing extra to crash, and the recursive nucleus stays
#   untouched. See network-context.md "Unbound DNS split" for the full rationale.
#
# tls-cert-bundle (below) is required to validate Cloudflare's TLS certificate;
# the `#cloudflare-dns.com` suffix on each forward-addr is the name the cert is
# checked against. To add a domain to the encrypted/fast path: append a
# forward-zone block identical to these, then `sudo systemctl restart unbound`.
# Unlisted domains stay recursive/private by default.

server:
    # Required for forward-tls-upstream: validates the upstream (Cloudflare) cert
    # against the system CA bundle. Provided by the ca-certificates package.
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

# --- Video streaming ---

forward-zone:
    name: "netflix.com"
    forward-tls-upstream: yes
    forward-first: yes
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

