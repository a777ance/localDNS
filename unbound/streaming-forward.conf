# Deploys to: /etc/unbound/unbound.conf.d/streaming-forward.conf
# Reload: sudo systemctl restart unbound
#
# THE DNS SPLIT LIVES HERE. This is the single decision point for where each
# query goes. Pi-hole forwards every query to Unbound (172.17.0.1#5335) and does
# no resolver selection of its own. Unbound then splits by domain:
#
#   * Domains listed below (streaming / music / gaming CDNs — high-volume,
#     low-sensitivity) are forwarded to THE CLOUDFLARE ENDOSYMBIONT: a local
#     cloudflared organelle on 127.0.0.1@5053 that speaks DNS-over-HTTPS to
#     Cloudflare's anycast edge (see systemd/cloudflared-proxy-dns.service).
#     This is the deliberate privacy-for-speed trade on low-sensitivity traffic.
#
#   * Everything NOT listed here — banking, email, health, personal services,
#     the default — is resolved recursively by Unbound with DNSSEC. No public
#     resolver, and not the organelle, ever sees these queries. This recursive
#     "nucleus" is sovereign. THE INVARIANT: never point the recursive path at
#     the organelle — that would hand Cloudflare your sensitive lookups, which is
#     the exact thing this whole design exists to prevent.
#
# forward-first: yes — if the organelle is unreachable, Unbound falls back to
# recursive resolution rather than returning SERVFAIL. Streaming just gets slower,
# never broken.
#
# WHY AN ENDOSYMBIONT INSTEAD OF THE OLD PLAINTEXT POOL:
#   This path used to forward to a pool of ~18 public resolvers over plaintext
#   UDP/53 (lowest-RTT wins). That leaked every streaming lookup to the ISP in
#   the clear. Engulfing ONE Cloudflare DoH organelle on loopback (a) encrypts
#   the hop the ISP used to read, and (b) rides Cloudflare's anycast network —
#   while keeping the recursive nucleus completely untouched. The organelle is
#   contained: loopback-only, forward-path-only, IP-literal upstreams (no DNS
#   bootstrap of its own). See network-context.md "Unbound DNS split" for the
#   full rationale, and the systemd unit header for the containment contract.
#
# To add a domain to the fast/encrypted path: append a forward-zone block below
# pointing at 127.0.0.1@5053, then `sudo systemctl restart unbound`. Unlisted
# domains stay recursive/private by default.

server:
    # Required so Unbound will forward to the loopback organelle. Unbound's
    # default is `do-not-query-localhost: yes`, which would silently refuse
    # 127.0.0.1@5053 and break the entire forward-path.
    do-not-query-localhost: no

# --- Video streaming ---

forward-zone:
    name: "netflix.com"
    forward-first: yes
    forward-addr: 127.0.0.1@5053

