# Deploys to: /etc/unbound/unbound.conf.d/streaming-forward.conf
# Reload: sudo systemctl restart unbound
#
# THE DNS SPLIT LIVES HERE. This is the single decision point.
#
# Pi-hole forwards every query to Unbound (172.17.0.1#5335) and does no
# resolver selection of its own. Unbound then splits by domain:
#
#   * Domains listed below (streaming / music / gaming CDNs — high-volume,
#     low-sensitivity) are forwarded OUT to three fast public resolvers:
#     Cloudflare (1.1.1.1), Google (8.8.8.8), and Quad9 (9.9.9.9). Unbound
#     sends each query to the lowest-latency forwarder and fails over to the
#     others — the fastest public resolver effectively wins. This is the
#     deliberate privacy-for-speed trade for low-sensitivity traffic.
#
#   * Everything NOT listed here — banking, email, health, personal services,
#     the default — is resolved recursively by Unbound with DNSSEC. No public
#     resolver ever sees these queries.
#
# forward-first: yes — if every forwarder is unreachable, Unbound falls back
# to recursive resolution rather than returning SERVFAIL.
#
# To add a domain to the fast/public path: copy a block, change the name,
# then `sudo systemctl restart unbound`. To keep a domain private, do nothing
# — unlisted domains are recursive by default.

# --- Video streaming ---

forward-zone:
    name: "netflix.com"
    forward-first: yes
    forward-addr: 1.1.1.1
    forward-addr: 8.8.8.8
    forward-addr: 9.9.9.9

