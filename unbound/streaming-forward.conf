# Deploys to: /etc/unbound/unbound.conf.d/streaming-forward.conf
# Reload: sudo systemctl restart unbound
#
# THE DNS SPLIT LIVES HERE. This is the single decision point AND the single
# source of truth for the public-resolver pool.
#
# Pi-hole forwards every query to Unbound (172.17.0.1#5335) and does no
# resolver selection of its own. Unbound then splits by domain:
#
#   * Domains listed below (streaming / music / gaming CDNs — high-volume,
#     low-sensitivity) are forwarded OUT to the public-resolver POOL listed
#     below. Unbound measures round-trip time per forwarder and routes each
#     query to the fastest, failing over and demoting slow/dead resolvers
#     automatically. Natural selection: the closest PoP wins, the rest idle.
#     A large pool only helps — a distant resolver simply never gets selected.
#     This is the deliberate privacy-for-speed trade on low-sensitivity traffic.
#
#   * Everything NOT listed here — banking, email, health, personal services,
#     the default — is resolved recursively by Unbound with DNSSEC. No public
#     resolver ever sees these queries.
#
# forward-first: yes — if the entire pool is unreachable, Unbound falls back to
# recursive resolution rather than returning SERVFAIL.
#
# POOL SELECTION CRITERIA (why these and not 100):
#   - Must answer PLAIN DNS on UDP/53 (Unbound forward-addr is plain by default).
#     DoH/DoT-only resolvers (Mullvad, dns0.eu, Applied Privacy, Digitale
#     Gesellschaft) are EXCLUDED — as plain forwarders they would be dead and add
#     timeout latency on cold misses.
#   - Reputable anycast operators only. China/Russia-based and hard-filtering
#     resolvers are excluded (latency, trust, and streaming-breakage risk).
#   - Non-obvious IPs verified against operator/reference sources, June 2026.
#
# THE POOL (18 operators / 35 addresses; lowest-RTT wins):
#   Cloudflare    1.1.1.1, 1.0.0.1
#   Google        8.8.8.8, 8.8.4.4
#   Quad9         9.9.9.9, 149.112.112.112
#   OpenDNS       208.67.222.222, 208.67.220.220
#   Level3        4.2.2.1, 4.2.2.2
#   DNS.WATCH     84.200.69.80, 84.200.70.40
#   Control D     76.76.2.0, 76.76.10.0
#   AdGuard       94.140.14.140, 94.140.14.141      (non-filtering endpoint)
#   Comodo        8.26.56.26, 8.20.247.20
#   Verisign      64.6.64.6, 64.6.65.6              (now operated by Neustar)
#   Neustar       156.154.70.1, 156.154.71.1        (UltraDNS Public / Vercara)
#   Gcore         95.85.95.85, 2.56.220.2
#   Quad101       101.101.101.101, 101.102.103.104  (TWNIC, Taiwan)
#   CIRA Shield   149.112.121.10, 149.112.122.10    (Canada)
#   CZ.NIC ODVR   193.17.47.1, 185.43.135.1         (Czechia)
#   UncensoredDNS 91.239.100.100, 89.233.43.71      (Denmark)
#   Hurricane EH  74.82.42.42
#   FDN           80.67.169.12, 80.67.169.40        (France)
#
# To add a domain to the fast/public path: append a forward-zone block with the
# identical pool, then `sudo systemctl restart unbound`. To add a resolver, add a
# forward-addr line to EVERY zone (keep them identical) and update the pool list
# above. Unlisted domains stay recursive/private by default.

# --- Video streaming ---

