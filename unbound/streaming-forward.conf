# Deploys to: /etc/unbound/unbound.conf.d/streaming-forward.conf
# Reload: sudo systemctl restart unbound
#
# Forward high-volume, low-sensitivity streaming/media domains to public
# resolvers (Cloudflare + Google). These resolvers include EDNS Client
# Subnet (ECS) in their queries, which tells CDN authoritative servers
# your approximate location — returning the nearest server for better
# throughput and lower latency.
#
# Everything NOT listed here resolves recursively through Unbound: full
# privacy, no single provider sees the query, no ECS leak.
#
# forward-first: yes — if the public resolver is unreachable, Unbound
# falls back to recursive resolution rather than returning SERVFAIL.

# --- Video streaming ---

forward-zone:
    name: "netflix.com"
    forward-first: yes
    forward-addr: 1.1.1.1
    forward-addr: 8.8.8.8

