server:
    num-threads: 4
    so-reuseport: yes

    rrset-cache-size: 512m
    msg-cache-size: 256m
    key-cache-size: 128m

    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    so-rcvbuf: 4m
    so-sndbuf: 4m

    prefetch: yes
    prefetch-key: yes

    cache-min-ttl: 3600
    cache-max-ttl: 7776000
    cache-max-negative-ttl: 3600

    serve-expired: yes
    serve-expired-ttl: 7776000

    minimal-responses: yes
    qname-minimisation: yes
