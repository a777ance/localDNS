# Deploys to: /etc/systemd/resolved.conf.d/host-dns.conf
# Reload: sudo systemctl restart systemd-resolved
#         (then re-point /etc/resolv.conf off the stub — see README Steps 3-4, Part A)
#
# Why the t630 resolves its OWN DNS via external resolvers, not its own Pi-hole:
#
# Pi-hole runs with network_mode: host and binds 0.0.0.0:53 on every interface so
# LAN and WireGuard clients can reach it. That bind COLLIDES with systemd-resolved's
# stub listener on 127.0.0.53:53 — on a fresh install Pi-hole fails to bind :53
# until the stub is turned off. DNSStubListener=no (below) frees the port.
#
# With the stub gone, the host needs somewhere else to send its own queries. It
# cannot use its own Pi-hole cleanly (host-originated lookups to 127.0.0.1:53 /
# 192.168.1.118:53 are unreliable and circular), and /etc/resolv.conf cannot carry
# Unbound's non-standard :5335 port. So point the host straight at external
# resolvers: its own resolution is then fully decoupled from the Docker/Pi-hole/
# Unbound stack and is never stranded while those services restart.
#
# Because DNSStubListener=no removes the 127.0.0.53 stub, /etc/resolv.conf must be
# re-pointed from stub-resolv.conf to /run/systemd/resolve/resolv.conf (which lists
# the DNS= servers below directly). README Steps 3-4 (Part A) does this. Without the re-point,
# resolv.conf still says "nameserver 127.0.0.53" and host DNS breaks.
#
# Trade: the box's own queries skip Pi-hole filtering — irrelevant on a headless
# server. See network-context.md "Host resolver" for the full analysis.
[Resolve]
DNS=9.9.9.9 1.1.1.1
DNSStubListener=no
