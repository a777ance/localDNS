[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY

# NAT: masquerade tunnel traffic out through the LAN interface.
# Forward rules allow wg0 traffic out and allow established return traffic in.
# These run via raw iptables, bypassing UFW's deny-routed default for this tunnel.
PostUp = iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; \
         iptables -A FORWARD -i wg0 -o enp1s0 -j ACCEPT; \
         iptables -A FORWARD -i enp1s0 -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT
PreDown = iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; \
          iptables -D FORWARD -i wg0 -o enp1s0 -j ACCEPT; \
          iptables -D FORWARD -i enp1s0 -o wg0 -m state --state RELATED,ESTABLISHED -j ACCEPT

[Peer]
# iPhone
PublicKey = REPLACE_WITH_PHONE_PUBLIC_KEY
AllowedIPs = 10.8.0.2/32
