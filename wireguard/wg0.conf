# Deploys to: /etc/wireguard/wg0.conf  (chmod 600)
# Reload: sudo systemctl restart wg-quick@wg0
# Add peer without restart: sudo wg set wg0 peer "PUBKEY" allowed-ips 10.8.0.X/32 && sudo wg-quick save wg0

[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
# 1420 = standard WireGuard MTU (1500 minus 60 bytes tunnel overhead).
# Without this, cellular paths drop oversized packets silently — breaking
# speed tests, Amazon, and any app that sends large UDP datagrams.
MTU = 1420

# MASQUERADE is in the nat table — PostUp is the right place for it and UFW
# does not touch the nat table.
#
# FORWARD rules are intentionally absent from the filter table here. Adding
# raw iptables -A FORWARD rules alongside UFW caused silent chain conflicts:
# UFW owns the filter FORWARD chain and any blanket ACCEPT rule it inserts
# in ufw-before-forward will terminate packet traversal before an appended
# rule is reached. Do not add 'iptables -A FORWARD' lines back here.
#
# MSS clamping uses the mangle table instead. The mangle FORWARD chain runs
# before the filter FORWARD chain in Netfilter's processing order, so it
# fires regardless of what UFW does in the filter table. TCPMSS is a packet
# modification target and belongs in mangle anyway.
PostUp = iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; iptables -t mangle -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PreDown = iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; iptables -t mangle -D FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

[Peer]
# iPhone — added via WireGuard iOS (App Store)
PublicKey = REPLACE_WITH_PHONE_PUBLIC_KEY
AllowedIPs = 10.8.0.2/32

[Peer]
# Mac — added via WireGuard macOS (App Store, NOT Homebrew)
PublicKey = REPLACE_WITH_MAC_PUBLIC_KEY
AllowedIPs = 10.8.0.7/32

[Peer]
# Windows laptop — added via WireGuard for Windows (wireguard.com/install)
# KEY ROTATION REQUIRED: the private key for this peer was shared in plaintext
# during setup. Regenerate: on the laptop, delete the tunnel, create a new one,
# and re-add the new public key to this file via the derivation method below.
PublicKey = REPLACE_WITH_LAPTOP_PUBLIC_KEY
AllowedIPs = 10.8.0.3/32
