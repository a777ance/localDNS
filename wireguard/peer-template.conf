# WireGuard peer config template — copy, fill in the blanks, remove comments.
#
# INSTALL THE APP CORRECTLY FIRST
# --------------------------------
# macOS:   WireGuard from the Mac App Store. Do NOT use Homebrew.
# iOS:     WireGuard from the App Store.
# Windows: WireGuard for Windows from https://www.wireguard.com/install/
#          Do NOT use the winget/choco package — use the official installer.
#          The official app generates key pairs in the GUI: click "Add Tunnel"
#          → "Create new tunnel from scratch".
#
# All three apps generate the PrivateKey automatically and show the PublicKey
# in the tunnel edit screen. Use those — do not generate keys manually.
#
# NEVER SHARE YOUR PRIVATE KEY. If it appears in a chat, log, or screenshot,
# treat it as compromised: delete the tunnel, create a new one, and re-add the
# new public key to the server. Private keys are one-time secrets.
#
# HOW TO ADD YOUR PUBLIC KEY TO THE SERVER
# -----------------------------------------
# After creating the tunnel in the WireGuard app, the app shows your Public Key
# in the tunnel detail screen. Share ONLY that public key with the server operator.
#
# A wrong public key means the peer simply can't connect — not a security breach.
# Public keys are not sensitive; private keys are. Never share your private key.
#
# On the server, add the peer:
#   sudo wg set wg0 peer "PEER_PUBLIC_KEY" allowed-ips 10.8.0.X/32
#   sudo wg-quick save wg0
#
# Verify by checking that the handshake completes:
#   sudo wg show   # the new peer should show a recent handshake timestamp

[Interface]

# Use /32 — NOT /24.
# /32 means "this interface owns exactly this one IP address."
# /24 would mean "this interface owns the entire 10.8.0.0/24 subnet" and
# makes the OS think it should handle routing for addresses it doesn't own.
# That causes routing weirdness and is wrong for a VPN client.
Address = 10.8.0.X/32

# Your private key. The App Store app fills this in automatically.
PrivateKey = REPLACE_WITH_YOUR_PRIVATE_KEY

# DNS: IP address only. NOT "IP:port". WireGuard's DNS field does not
# accept port numbers — "172.17.0.1:5335" is invalid syntax and will be
# silently ignored or error out, leaving you with no DNS once full-tunnel
# kicks in (which looks like "internet doesn't work").
#
# Also: 172.17.0.1 is the Docker bridge gateway on the server host — it
# is not reachable from outside that host. Do not use it here.
#
# Use 10.8.0.1 — the server's wg0 interface IP, reachable over the tunnel,
# which forwards to Pi-hole for ad-blocking + DNSSEC everywhere.
DNS = 10.8.0.1

[Peer]

# Server's public key — get this from /etc/wireguard/server.pub on the t630.
PublicKey = REPLACE_WITH_SERVER_PUBLIC_KEY

# AllowedIPs = 0.0.0.0/0, ::/0 means full tunnel: ALL traffic goes through
# the VPN. This is what you want.
#
# Do NOT set AllowedIPs = 10.8.0.0/24 or 192.168.1.0/24. That is
# split-tunnel: only LAN traffic routes through the VPN and all web traffic
# bypasses it. The tunnel will show "connected" but whatismyip.com will
# still show your real IP — indistinguishable from the VPN being off.
AllowedIPs = 0.0.0.0/0, ::/0

# Server endpoint. Port 51820 is open to Anywhere on the t630 firewall
# for exactly this reason — peers connect from cellular/untrusted networks.
Endpoint = <WAN-IP>:51820

# Sends a keepalive every 25 seconds. Required when the peer is behind NAT
# (home router or cellular carrier) — without it, the NAT mapping expires
# and the tunnel silently drops after a few minutes of idle.
PersistentKeepalive = 25
