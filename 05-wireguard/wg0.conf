# Deploys to: /etc/wireguard/wg0.conf  (chmod 600)
# Reload: sudo systemctl restart wg-quick@wg0
# Add peer without restart: sudo wg set wg0 peer "PUBKEY" allowed-ips 10.8.0.X/32 && sudo wg-quick save wg0
#
# Peer PublicKeys below ship as PLACEHOLDERS — this file is a committed template.
# Public keys are safe to commit (a public key cannot connect without its private
# half), but the repo keeps them generic; fill in each device's real public key on
# the box per README Step 7. The server PrivateKey also stays a placeholder — never
# commit the real one.

[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
# 1420 = standard WireGuard MTU (1500 minus 60 bytes tunnel overhead).
# Without this, cellular paths drop oversized packets silently — breaking
# speed tests, Amazon, and any app that sends large UDP datagrams.
MTU = 1420

# MASQUERADE is in the nat table — PostUp is the right place for it and UFW
# does not touch the nat table.
#
# FORWARD *ACCEPT / policy* rules are intentionally absent here. Adding raw
# iptables FORWARD accept rules alongside UFW caused silent chain conflicts: UFW
# owns the filter FORWARD chain, and manually appended rules can be shadowed by
# UFW's own DROP policy. The correct fix is 'ufw default allow routed' in setup.sh,
# which sets DEFAULT_FORWARD_POLICY=ACCEPT at the UFW level. Do not add
# 'iptables -A FORWARD ... -j ACCEPT' lines back here.
#
# The one FORWARD rule that IS present below is the TCPMSS MSS-clamp — it rewrites
# TCP MSS to fit the tunnel MTU and does not accept/drop traffic, so it does not
# fight UFW's policy. It is load-bearing for cellular PMTU and must stay.
#
# MSS clamping: forces TCP to negotiate segment sizes that fit inside the
# tunnel MTU. Handles apps that ignore the MTU setting and send large SYNs.
PostUp = iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; iptables -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PreDown = iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -o enp1s0 -j MASQUERADE; iptables -D FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

# IPv6: this tunnel is IPv4-only — wg0 has no IPv6 address and there is no
# ip6tables MASQUERADE here, so peers must NOT route ::/0 (it black-holes all
# IPv6: handshake succeeds, pages hang). The home has working IPv6, so full
# dual-stack is possible — see network-context.md "WireGuard IPv6 black hole"
# for the ULA + NAT66 setup. Until then, peers use AllowedIPs = 0.0.0.0/0.

[Peer]
# iPhone — WireGuard iOS (App Store). Replace the placeholder with the device's
# real PUBLIC key before starting WireGuard (README Step 7).
PublicKey = REPLACE_WITH_PHONE_PUBLIC_KEY
AllowedIPs = 10.8.0.2/32

# Windows laptop — WireGuard for Windows (wireguard.com/install).
# KEY ROTATION PENDING: this peer's private key was exposed in plaintext during
# setup. Uncomment and fill in a FRESH public key once the device re-registers.
# [Peer]
# PublicKey = REPLACE_WITH_LAPTOP_PUBLIC_KEY
# AllowedIPs = 10.8.0.3/32

# UNIDENTIFIED peers 10.8.0.4–10.8.0.6 — present on the live server with no recent
# handshake (see INSTALL-NOTES "Operational & Open Issues"). Identify each device,
# then uncomment and add its real public key here — or remove the stale peer.
# [Peer]
# PublicKey = REPLACE_WITH_PEER_PUBLIC_KEY
# AllowedIPs = 10.8.0.4/32
# [Peer]
# PublicKey = REPLACE_WITH_PEER_PUBLIC_KEY
# AllowedIPs = 10.8.0.5/32
# [Peer]
# PublicKey = REPLACE_WITH_PEER_PUBLIC_KEY
# AllowedIPs = 10.8.0.6/32

# Mac — WireGuard macOS (App Store, NOT Homebrew). Uncomment and fill in the real
# public key to enable.
# [Peer]
# PublicKey = REPLACE_WITH_MAC_PUBLIC_KEY
# AllowedIPs = 10.8.0.7/32
