# Deploys to: /etc/systemd/resolved.conf.d/host-dns.conf
# Reload: sudo systemctl restart systemd-resolved
#
# Why the t630 resolves its OWN DNS via external resolvers, not its own Pi-hole:
#
# Pi-hole runs in Docker publishing 0.0.0.0:53. LAN and WireGuard clients reach it
# fine through Docker's DNAT, but HOST-originated queries to 127.0.0.1:53 (or even
# the host's own LAN IP 192.168.1.118:53) are dropped by the UFW<->Docker path and
# time out. Unbound answers on 127.0.0.1:5335, but /etc/resolv.conf cannot carry a
# non-53 port, so the host can't point at Unbound directly either.
#
# Left pointing at 127.0.0.1, the box cannot resolve anything for itself — apt, git
# and curl all fail with "Temporary failure in name resolution" even though the DNS
# service is healthy for every other device. Pointing the host at external resolvers
# decouples its own resolution from the Docker/Pi-hole/Unbound stack so it is never
# stranded while those services restart.
#
# Trade: the box's own queries skip Pi-hole filtering — irrelevant on a headless
# server. See network-context.md "Host resolver" for the full analysis.
[Resolve]
DNS=9.9.9.9 1.1.1.1
