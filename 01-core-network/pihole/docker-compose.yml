# Deploys to: ~/pihole/docker-compose.yml
# Reload: cd ~/pihole && docker compose up -d
#
# Pi-hole runs with network_mode: host. It binds :53 and the web UI directly on
# every host interface — including wg0 (10.8.0.1). This is required so WireGuard
# peers' DNS queries are answered: with Docker's bridge + published ports, queries
# sourced from the host's own interfaces (wg0) arrive at :53 but Docker's DNAT does
# not return replies, so VPN-peer DNS silently failed. Host networking removes the
# DNAT path entirely and fixes it.
#
# IMPORTANT: After first deploy, confirm upstream DNS in Pi-hole UI:
#   Settings → DNS → custom upstream must be the single entry 127.0.0.1#5335
#   (Unbound on the host; reachable directly because Pi-hole shares the host
#   network stack). Do NOT add public resolvers here — the streaming/personal
#   split is owned entirely by Unbound (see 01-core-network/unbound/streaming-forward.conf).
#   Adding public resolvers would race them for ALL queries and leak personal
#   lookups. The PIHOLE_DNS_ env var below only seeds this on a fresh volume; if
#   the volume already exists, update it manually in the UI.

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    # Host networking: Pi-hole owns :53 and :8080 on every interface (incl. wg0),
    # so both DNS and the web UI work for VPN peers. The ports: block is removed
    # (host mode ignores it). WEB_PORT keeps the UI on 8080 — without it host mode
    # binds the web server to :80, which UFW does not open.
    network_mode: host
    environment:
      TZ: "America/New_York"
      WEB_PORT: "8080"
      # Upstream DNS — single upstream: Unbound on the host loopback.
      # Pi-hole forwards EVERY query to Unbound, which then decides per-domain:
      # streaming/low-sensitivity domains are forwarded to Cloudflare over DoT for
      # speed (see 01-core-network/unbound/streaming-forward.conf); everything else resolves
      # recursively and privately. A single upstream guarantees no public resolver
      # ever sees a personal query.
      PIHOLE_DNS_: "127.0.0.1#5335"
      WEBPASSWORD: "CHANGE_ME"
      DNSMASQ_USER: "pihole"
      FTL_CMD: "no-daemon"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d

volumes:
  pihole_data:
  dnsmasq_data:
