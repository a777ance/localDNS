# Unbound DNS choke — allowlist-only resolution.  MEMBRANE DESIGN — not live.
#
# Default: every name is NXDOMAIN. Only names given a `transparent` zone resolve
# (the more-specific local-zone wins), covering the domain and its subdomains.
# Deploy on D:  /etc/unbound/unbound.conf.d/dns-choke.conf  then restart unbound.
#
# Keep in sync with the @allow4 egress set: a domain that may RESOLVE should have
# its resolved IPs added to @allow4 so the connection may also LEAVE. A name that
# resolves but whose IPs aren't allowlisted still can't be reached (fail closed) —
# you'll just see it in the egress-deny log, which is the point.

server:
    # deny-by-default
    local-zone: "." always_nxdomain

    # --- allowlist: one transparent zone per permitted domain -------------------
    # OS + repos
    local-zone: "ubuntu.com." transparent
    local-zone: "canonical.com." transparent
    # dev
    local-zone: "github.com." transparent
    local-zone: "githubusercontent.com." transparent
    # time
    local-zone: "ntp.org." transparent
    # ... add exactly what your devices legitimately need, and nothing more ...
