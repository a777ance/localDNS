# ─────────────────────────────────────────────────────────────────────────────
# LiteLLM router — config.yaml
# Deploys to: ~/llm-router/config.yaml    Reload: cd ~/llm-router && docker compose up -d
#
# One OpenAI-compatible front door (ai.home.lan:4040) in front of WHOLE-MODEL
# backends. The local Ollama tiers on the t630 are the default; the cloud tier is a
# failover/overflow path, never the primary. This router does NOT split one model
# across machines — see 10-llm-router/README.md, "Route, don't shard".
#
# Secrets are read from ~/llm-router/.env (LITELLM_MASTER_KEY, ANTHROPIC_API_KEY)
# via the os.environ/ indirection below — never inline real keys in this file.
# ─────────────────────────────────────────────────────────────────────────────

model_list:
  # ── Local, on the t630 — CPU inference, the privacy-preserving default ──
  # The box is a 4-core AMD Carrizo, 16 GB RAM, no usable GPU offload, so these run
  # on the CPU. Only list tags you have actually `ollama pull`-ed.
  - model_name: local-fast            # interactive / snappy — small model
    litellm_params:
      model: ollama_chat/qwen2.5:3b
      api_base: http://127.0.0.1:11434

  - model_name: local-smart           # better reasoning — 7B, slower on CPU
    litellm_params:
      model: ollama_chat/qwen2.5:7b
      api_base: http://127.0.0.1:11434

  # ── Reasoning ladder: light distill local, heavy DeepSeek-R1 offloaded ──
  # WHY this is split, not a single deepseek-r1:7b on local CPU: an R1 model emits a
  # long chain-of-thought before every answer, so on a CPU it pins all cores for
  # minutes per prompt. That sustained 100%-CPU load is what cooks a laptop (fans
  # screaming) — and the t630's Carrizo would just thermal-throttle and crawl. So the
  # heavy reasoner never runs on local CPU. Two tiers instead:
  #
  #   local-reason       a SMALL distill for everyday "show your work" — runs cool on
  #                      the t630 CPU. The t630 carries it, your laptop stays a thin
  #                      browser client and never heats up.
  #   cloud-gpu-reason   the FULL-size DeepSeek-R1 on a RENTED GPU (Vast.ai / RunPod),
  #                      reached over a Tailscale tunnel — "GeForce Now for LLMs."
  #                      Spin the pod up for a heavy session, stop it when done; while
  #                      it's off, requests fall over to cloud-overflow (see fallbacks).
  # See README "Offload heavy reasoning to a rented GPU" for the pod + tunnel setup.
  - model_name: local-reason          # light reasoning, t630 CPU (after `ollama pull deepseek-r1:1.5b`)
    litellm_params:
      model: ollama_chat/deepseek-r1:1.5b
      api_base: http://127.0.0.1:11434

  - model_name: cloud-gpu-reason      # heavy reasoning — full DeepSeek-R1 on a rented GPU
    litellm_params:
      model: ollama_chat/deepseek-r1:32b          # size the pod for the tag you actually pull (32b/70b)
      api_base: http://CHANGE_ME_GPU_HOST:11434   # the rented box's Tailscale IP (e.g. 100.x.y.z), NOT a public IP

  # ── A second box, when you add one (a WHOLE model on another machine) ──
  # Reuse a model_name and LiteLLM load-balances + fails over across the copies.
  # - model_name: local-smart
  #   litellm_params:
  #     model: ollama_chat/qwen2.5:7b
  #     api_base: http://192.168.1.120:11434   # CHANGE_ME — the other machine's Ollama

  # ── Cloud overflow — failover target only; bills per token ──
  - model_name: cloud-overflow
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  # Cheaper / faster cloud swaps (exact current IDs): anthropic/claude-sonnet-4-6,
  # anthropic/claude-haiku-4-5. Change the `model:` above to switch the overflow tier.

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 600                        # CPU 7B is slow — don't cut a generation off early
  allowed_fails: 2                    # failures before a backend is cooled down
  cooldown_time: 60                   # seconds a dead backend stays out of rotation
  # "Turn a laptop off and it re-routes": when a backend stops answering, LiteLLM
  # cools it down and falls through this map to the next. Local tiers spill to cloud.
  # The reasoning ladder degrades gracefully: light → heavy GPU → cloud. When the
  # rented GPU pod is stopped (its normal idle state) cloud-gpu-reason can't be
  # reached, so those requests fall to cloud-overflow instead of erroring.
  fallbacks:
    - local-fast: ["local-smart", "cloud-overflow"]
    - local-smart: ["cloud-overflow"]
    - local-reason: ["cloud-gpu-reason", "cloud-overflow"]
    - cloud-gpu-reason: ["cloud-overflow"]

litellm_settings:
  drop_params: true                   # tolerate OpenAI params a local model ignores
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # clients send: Authorization: Bearer <key>
  background_health_checks: true              # /health reflects which backends are up
  health_check_interval: 120
